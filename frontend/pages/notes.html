<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRAG • AI Notes</title>
<link rel="stylesheet" href="../css/notes.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="page">

<header class="topbar">
<div>
<h1 id="subjectTitle">AI Notes</h1>
<p>Well-structured notes generated from your study material.</p>
</div>

<button id="generateBtn" class="primary-btn">
<i class="bi bi-stars"></i>
Generate Notes
</button>
</header>

<section class="stats-grid">
<div class="stat-card">
<h3>Total Notes</h3>
<h2 id="totalNotes">0</h2>
</div>

<div class="stat-card">
<h3>Sections</h3>
<h2 id="totalSections">0</h2>
</div>

<div class="stat-card">
<h3>Reading Time</h3>
<h2 id="readingTime">0 min</h2>
</div>
</section>

<section class="toolbar">
<input id="searchInput" type="text" placeholder="Search notes...">
</section>

<div class="content-layout">

<main>

<div id="notesContainer">

<div class="empty-state">
<i class="bi bi-journal-richtext"></i>
<h2>No Notes Available</h2>
<p>Click <strong>Generate Notes</strong> to create AI study notes.</p>
</div>

</div>

</main>

<aside class="toc">
<h3>Contents</h3>
<div id="tocContainer">
<p>No sections yet.</p>
</div>
</aside>

</div>

</div>

<script src="../js/notes.js"></script>

</body>
</html>
