<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRAG | Subjects</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/subjects.css">
</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<div class="logo">
<i class="bi bi-mortarboard-fill"></i>
<span>EduRAG</span>
</div>

<nav>
<a href="dashboard.html"><i class="bi bi-house"></i> Dashboard</a>
<a class="active" href="subjects.html"><i class="bi bi-book"></i> Subjects</a>
<a href="documents.html"><i class="bi bi-file-earmark-text"></i> Documents</a>
<a href="chat.html"><i class="bi bi-chat-dots"></i> AI Chat</a>
<a href="flashcards.html"><i class="bi bi-stack"></i> Flashcards</a>
<a href="quiz.html"><i class="bi bi-patch-question"></i> Quiz</a>
<a href="planner.html"><i class="bi bi-calendar-week"></i> Study Planner</a>
<a href="notes.html"><i class="bi bi-journal-text"></i> Notes</a>
</nav>

<div class="bottom-links">
<a href="#"><i class="bi bi-gear"></i> Settings</a>
<a href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

</aside>

<main class="content">

<header class="topbar">

<div class="search">
<i class="bi bi-search"></i>
<input type="text" id="searchSubject" placeholder="Search subjects...">
</div>

<button id="addSubjectBtn" class="btn-primary">
<i class="bi bi-plus-lg"></i>
New Subject
</button>

</header>

<section class="page-header">
<h1>📚 Subjects</h1>
<p>Manage all your learning subjects.</p>
</section>

<div id="subjectsContainer" class="subjects-grid">
<!-- Subjects loaded dynamically -->
</div>

<section class="summary">

<div class="summary-card">
<h4>Total Subjects</h4>
<h2 id="totalSubjects">0</h2>
</div>

</section>

</main>

</div>

<div id="subjectModal" class="modal hidden">

<div class="modal-content">

<h2>Create Subject</h2>

<input
type="text"
id="subjectName"
placeholder="Subject Name">

<textarea
id="subjectDescription"
placeholder="Description"></textarea>

<div class="modal-buttons">
<button id="saveSubject" class="new-btn">Create</button>
<button id="closeModal">Cancel</button>
</div>

</div>

</div>

<script src="../js/subjects.js"></script>

</body>
</html>
