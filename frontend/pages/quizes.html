<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRAG • Quiz</title>

    <link rel="stylesheet" href="../css/quizes.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="page">

    <header class="topbar">

        <div>
            <h1 id="subjectTitle">📝 AI Quiz</h1>
            <p>Test your understanding with AI-generated multiple-choice questions.</p>
        </div>

        <button id="generateBtn" class="primary">
            <i class="bi bi-stars"></i>
            Generate Quiz
        </button>

    </header>

    <section class="progress-bar">

        <span id="progress">0 / 0</span>

    </section>

    <main id="quizContainer" class="quiz-card">

        <div class="empty-state">

            <i class="bi bi-patch-question"></i>

            <h2>No Quiz Available</h2>

            <p>Click <strong>Generate Quiz</strong> to create AI-powered MCQs from your documents.</p>

        </div>

    </main>

    <section class="navigation">

        <button id="previousBtn" class="secondary">
            <i class="bi bi-arrow-left"></i>
            Previous
        </button>

        <button id="nextBtn" class="secondary">
            Next
            <i class="bi bi-arrow-right"></i>
        </button>

        <button id="submitBtn" class="primary">
            <i class="bi bi-check-circle"></i>
            Submit Quiz
        </button>

    </section>

    <section id="resultSection" class="result-card" style="display:none;">

        <h2>Quiz Result</h2>

        <h1 id="score">0 / 0</h1>

        <p id="percentage">0%</p>

        <button id="retryBtn" class="primary">
            <i class="bi bi-arrow-clockwise"></i>
            Retry Quiz
        </button>

    </section>
    <section id="reviewSection" class="result-card" style="display:none;">

    <h2>Review Answers</h2>

    <div id="reviewContainer"></div>

</section>

    <footer>

        <a class="back-link" href="documents.html">
            <i class="bi bi-arrow-left-circle"></i>
            Back to Documents
        </a>

    </footer>

</div>

<script src="../js/quizes.js"></script>

</body>
</html>
