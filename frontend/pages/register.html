<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRAG | Register</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">

    <section class="left-panel">

        <div class="logo">
            <i class="bi bi-mortarboard-fill"></i>
            <span>EduRAG</span>
        </div>

        <div class="hero">
            <img src="../assets/images/student.svg"
                 alt="Student"
                 class="student-image">

            <h1>Create Your<br><span>Learning Space</span></h1>

            <p>
                Join EduRAG and transform your notes into AI-powered
                explanations, quizzes, summaries and flashcards.
            </p>
        </div>

    </section>

    <section class="right-panel">

        <div class="login-card">

            <h2>Create Account ✨</h2>

            <p class="subtitle">
                Start your AI learning journey today
            </p>

            <form id="registerForm">

                <label>Full Name</label>
                <div class="input-box">
                    <i class="bi bi-person"></i>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Enter your full name"
                        required>
                </div>

                <label>Email</label>
                <div class="input-box">
                    <i class="bi bi-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <label>Password</label>
                <div class="input-box">
                    <i class="bi bi-lock"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Create password"
                        required>

                    <button
                        type="button"
                        id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <label>Confirm Password</label>
                <div class="input-box">
                    <i class="bi bi-shield-lock"></i>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required>
                </div>

                <button
                    type="submit"
                    class="login-btn">
                    Create Account
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="register">
                Already have an account?
                <a href="../index.html">Login</a>
            </div>

        </div>

    </section>

</div>

<script src="../js/register.js"></script>

</body>
</html>
