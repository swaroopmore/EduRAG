<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduRAG • Flashcards</title>
<link rel="stylesheet" href="../css/flashcards.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="page">
<header class="topbar">
<div>
<h1 id="subjectTitle">🧠 Flashcards</h1>
<p>Study smarter with AI-generated flashcards.</p>
</div>
<div class="actions">
<button id="generateBtn" class="primary"><i class="bi bi-stars"></i> Generate Flashcards</button>
<button id="shuffleBtn" class="secondary"><i class="bi bi-shuffle"></i> Shuffle</button>
</div>
</header>

<section class="progress-section">
<span id="progress">0 / 0</span>
</section>

<main class="flashcard-wrapper">
<div id="flashcard" class="flashcard">
<div class="empty-state">
<i class="bi bi-journal-richtext"></i>
<h2>No Flashcards Yet</h2>
<p>Click <strong>Generate Flashcards</strong> to create study cards from your uploaded documents.</p>
</div>
</div>
</main>

<section class="controls">
<button id="previousBtn" class="secondary"><i class="bi bi-arrow-left"></i> Previous</button>
<button id="flipBtn" class="primary"><i class="bi bi-arrow-repeat"></i> Flip Card</button>
<button id="nextBtn" class="secondary">Next <i class="bi bi-arrow-right"></i></button>
</section>

<footer class="footer">
<a href="documents.html" class="back-link"><i class="bi bi-arrow-left-circle"></i> Back to Documents</a>
</footer>
</div>

<script src="../js/flashcards.js"></script>
</body>
</html>
